name: 🏷️ Cria Release (tag automática)

# Dispara só quando algo é mergeado/empurrado direto na main
# (o fluxo normal do GitFlow: release/* ou hotfix/* -> main)
on:
  push:
    branches:
      - main

permissions:
  contents: write   # necessário pra criar a tag e o GitHub Release

jobs:
  tag:
    name: 🏷️ Analisa commits e cria tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisa do histórico completo + todas as tags pra calcular a próxima versão
          persist-credentials: true

      - name: Lê a versão do Godot e extrai o major
        id: godot
        run: |
          VERSION=$(tr -d '[:space:]' < .godot-version)
          MAJOR="${VERSION%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Calcula a próxima versão
        id: next
        run: |
          set +e
          NEXT_TAG=$(GODOT_MAJOR=${{ steps.godot.outputs.major }} node .github/workflows/next-version.js)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Nenhuma release necessária neste push."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Cria e envia a tag
        if: steps.next.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.next.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Cria GitHub Release
        if: steps.next.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.next.outputs.tag }}" \
            --title "${{ steps.next.outputs.tag }}" \
            --generate-notes
