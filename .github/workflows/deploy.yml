name: 🚀 Deploy itch.io (release)

# Dispara quando a tag vX.Y.Z é criada (pelo workflow release.yml ou manualmente)
on:
  push:
    tags:
      - 'v*.*.*'

env:
  ITCH_USER_NAME: "meneghin"
  EXPORT_NAME: "bee-the-bee"
  URL_BUTLER_ITCH: "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"

jobs:
  read-version:
    name: 📄 Lê versão do Godot
    runs-on: ubuntu-latest
    outputs:
      godot_version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          VERSION=$(tr -d '[:space:]' < .godot-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: 🔧 Build
    needs: [read-version]
    uses: ./.github/workflows/_build.yml
    with:
      godot_version: ${{ needs.read-version.outputs.godot_version }}
      version: ${{ github.ref_name }}

  deploy-itchio:
    name: 🚀 Deploy para itch.io
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Baixa build Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: build/linux

      - name: Baixa build Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build/windows

      - name: Instala o butler
        run: |
          curl -L -o butler.zip ${{ env.URL_BUTLER_ITCH }}
          unzip butler.zip
          chmod +x butler

      - name: Deploy Linux para itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.API_KEY_ITCH }}
        run: |
          pushd build/linux
          zip -r ../../${{ env.EXPORT_NAME }}-linux.zip .
          popd
          ./butler push ${{ env.EXPORT_NAME }}-linux.zip \
            ${{ env.ITCH_USER_NAME }}/${{ env.EXPORT_NAME }}:linux \
            --userversion ${{ github.ref_name }}

      - name: Deploy Windows para itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.API_KEY_ITCH }}
        run: |
          pushd build/windows
          zip -r ../../${{ env.EXPORT_NAME }}-windows.zip .
          popd
          ./butler push ${{ env.EXPORT_NAME }}-windows.zip \
            ${{ env.ITCH_USER_NAME }}/${{ env.EXPORT_NAME }}:windows \
            --userversion ${{ github.ref_name }}
