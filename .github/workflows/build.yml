name: Todo list godot

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  # Ajuste para o caminho real da pasta do seu addon dentro de addons/
  ADDON_PATH: "addons/todo-list-godot"
  ADDON_NAME: "todo-list-godot"
  ITCH_USER_NAME: "meneghin"
  ITCH_GAME_NAME: "todo-list-godot-plugin"
  URL_BUTLER_ITCH: "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"

jobs:
  package-addon:
    name: 📦 Empacota o addon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Confere se a pasta do addon existe
        run: |
          if [ ! -d "${{ env.ADDON_PATH }}" ]; then
            echo "❌ Pasta ${{ env.ADDON_PATH }} não encontrada. Ajuste a env ADDON_PATH no workflow."
            exit 1
          fi
          if [ ! -f "${{ env.ADDON_PATH }}/plugin.cfg" ]; then
            echo "❌ plugin.cfg não encontrado em ${{ env.ADDON_PATH }}. Isso não parece um addon válido."
            exit 1
          fi

      - name: Cria o zip do addon
        run: |
          mkdir -p build
          ADDON_DIR_NAME=$(basename "${{ env.ADDON_PATH }}")
          zip -r "${{ github.workspace }}/build/addons.zip" addons \
            -x "*.import" -x "*.uid" -x "*.tmp"

      - name: Faz upload do artefato (entre jobs)
        uses: actions/upload-artifact@v4
        with:
          name: addon-zip
          path: build/${{ env.ADDON_NAME }}.zip

  release-github:
    name: 🏷️ Cria Release no GitHub
    needs: package-addon
    runs-on: ubuntu-latest
    # só cria release quando você empurrar uma tag tipo v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Baixa o zip do addon
        uses: actions/download-artifact@v4
        with:
          name: addon-zip
          path: build

      - name: Cria a Release com o zip anexado
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.ADDON_NAME }}.zip
          generate_release_notes: true

  deploy-itchio:
    name: 🚀 Deploy para itch.io
    needs: package-addon
    runs-on: ubuntu-latest
    # só faz deploy em push direto na main (não em PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Baixa o zip do addon
        uses: actions/download-artifact@v4
        with:
          name: addon-zip
          path: build

      - name: Instala o butler
        run: |
          curl -L -o butler.zip ${{ env.URL_BUTLER_ITCH }}
          unzip butler.zip
          chmod +x butler

      - name: Deploy do addon para itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.API_KEY_ITCH }}
        run: |
          ./butler push build/${{ env.ADDON_NAME }}.zip \
            ${{ env.ITCH_USER_NAME }}/${{ env.ITCH_GAME_NAME }}:addon
