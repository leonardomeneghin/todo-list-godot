name: ✅ Validação de PR

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  read-version:
    name: 📄 Lê versão do Godot
    runs-on: ubuntu-latest
    outputs:
      godot_version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          VERSION=$(tr -d '[:space:]' < .godot-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: 🔧 Build de validação
    needs: [read-version]
    uses: ./.github/workflows/_build.yml
    with:
      godot_version: ${{ needs.read-version.outputs.godot_version }}
