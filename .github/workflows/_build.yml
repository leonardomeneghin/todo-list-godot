name: 🔧 Build (reusável)

on:
  workflow_call:
    inputs:
      godot_version:
        description: "Versão do Godot a usar (ex: 4.3). Vem do .godot-version do repositório."
        required: true
        type: string
      version:
        description: "Versão a ser embutida no build (ex: 1.2.3). Vazio = build de validação."
        required: false
        type: string
        default: ""

env:
  EXPORT_NAME: "todo-list-godot-plugin"

jobs:
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Cache dos Export Templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ inputs.godot_version }}

      - name: Instala dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Baixa o Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ inputs.godot_version }}-stable/Godot_v${{ inputs.godot_version }}-stable_linux.x86_64.zip
          unzip -q Godot_v${{ inputs.godot_version }}-stable_linux.x86_64.zip
          mv Godot_v${{ inputs.godot_version }}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Baixa os Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ inputs.godot_version }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ inputs.godot_version }}-stable/Godot_v${{ inputs.godot_version }}-stable_export_templates.tpz
          unzip -q Godot_v${{ inputs.godot_version }}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ inputs.godot_version }}.stable/

      - name: Importa o projeto
        run: ./godot --headless --editor --quit || true

      - name: Cria pasta de output
        run: mkdir -p build/linux

      - name: Aplica versão no project.godot
        if: inputs.version != ''
        run: |
          sed -i "s/^config\/version=.*/config\/version=\"${{ inputs.version }}\"/" project.godot || true

      - name: Exporta para Linux
        run: |
          ./godot --headless \
            --export-release "Linux/X11" \
            build/linux/${{ env.EXPORT_NAME }}.x86_64

      - name: Faz upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/

  build-windows:
    name: 🪟 Build Windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ inputs.godot_version }}

      - name: Instala dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Baixa o Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ inputs.godot_version }}-stable/Godot_v${{ inputs.godot_version }}-stable_linux.x86_64.zip
          unzip -q Godot_v${{ inputs.godot_version }}-stable_linux.x86_64.zip
          mv Godot_v${{ inputs.godot_version }}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Baixa os Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ inputs.godot_version }}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${{ inputs.godot_version }}-stable/Godot_v${{ inputs.godot_version }}-stable_export_templates.tpz
          unzip -q Godot_v${{ inputs.godot_version }}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ inputs.godot_version }}.stable/

      - name: Cria pasta de output
        run: mkdir -p build/windows

      - name: Aplica versão no project.godot
        if: inputs.version != ''
        run: |
          sed -i "s/^config\/version=.*/config\/version=\"${{ inputs.version }}\"/" project.godot || true

      - name: Exporta para Windows
        run: |
          ./godot --headless \
            --export-release "Windows Desktop" \
            build/windows/${{ env.EXPORT_NAME }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/
